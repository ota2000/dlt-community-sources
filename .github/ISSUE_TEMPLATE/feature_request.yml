name: Feature Request
description: Suggest a new feature or resource
labels: [enhancement]
body:
  - type: dropdown
    id: source
    attributes:
      label: Source
      description: Which source is this for?
      options:
        - app_store_connect
        - twilio
        - nextdns
        - Other / New source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
    validations:
      required: false
